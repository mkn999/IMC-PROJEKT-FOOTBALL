<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Today's Match</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="matches">
      <button onclick="getMatches()">Load Matches</button>

      <div id="container"></div>
    </div>
  </body>
  <script>
    function getMatches() {
      fetch("http://127.0.0.1:5000/matches")
        .then((response) => {
          return response.json();
        })
        .then((data) => {
          const container = document.getElementById("container");
          container.innerHTML = "";
          for (let key in data) {
            match = data[key];
            container.innerHTML += `
 <div class="match-card">

            <div class="teams">

    <div class="team">
        <img src="${match.homeTeamFlag}">
        <h2>${match.homeTeam}</h2>
    </div>

    <h3>VS</h3>

    <div class="team">
        <img src="${match.awayTeamFlag}">
        <h2>${match.awayTeam}</h2>
    </div>

</div>
            <p>${match.venue}</p>

            <p>${match.time}</p>

        </div>
            `;
          }
        });
    }
  </script>
</html>
