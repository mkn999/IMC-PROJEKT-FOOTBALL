<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Today's Match</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="matches">
      <button onclick="getMatches()">Load Matches</button>

      <div id="container"></div>
    </div>
  </body>
  <script>
    function convertToIST(utcTime) {
      return new Date(utcTime).toLocaleString("en-IN", {
        timeZone: "Asia/Kolkata",
      });
    }
    function getMatches() {
      fetch("http://127.0.0.1:5000/getMatches")
        .then((response) => {
          return response.json();
        })
        .then((data) => {
          const container = document.getElementById("container");
          // console.log(data);
          container.innerHTML = "";
          for (let key in data) {
            match = data[key];
            console.log(match);
            container.innerHTML += `
 <div class="match-card">

            <div class="teams">

    <div class="team">
        <img src="${match.homeTeam.crest}">
        <h2>${match.homeTeam.name}</h2>
    </div>

    <h3>VS</h3>

    <div class="team">
        <img src="${match.awayTeam.crest}">
        <h2>${match.awayTeam.name}</h2>
    </div>

</div>

            <p>${convertToIST(match.utcDate)}</p>

        </div>
            `;
          }
        });
    }
  </script>
</html>
