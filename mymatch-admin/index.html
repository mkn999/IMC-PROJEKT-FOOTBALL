<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Match</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, Helvetica, sans-serif;

        background: radial-gradient(
          circle at top,
          #4a3b12 0%,
          #1a1a1a 35%,
          #0d0d0d 70%,
          #000 100%
        );

        min-height: 100vh;
      }

      /* ========================= */
      /* Dashboard */
      /* ========================= */

      .dashboard {
        display: flex;

        min-height: 100vh;
      }

      /* ========================= */
      /* Sidebar */
      /* ========================= */

      .sidebar {
        width: 260px;

        background: #141414;

        border-right: 1px solid rgba(247, 215, 116, 0.2);

        padding: 35px 20px;

        display: flex;

        flex-direction: column;

        gap: 18px;

        box-shadow: 8px 0 25px rgba(0, 0, 0, 0.4);
      }

      .sidebar h1 {
        color: #f7d774;

        text-align: center;

        font-size: 28px;

        margin-bottom: 35px;
      }

      /* ========================= */
      /* Buttons */
      /* ========================= */

      .menu-btn {
        background: #232323;

        color: white;

        border: none;

        border-radius: 10px;

        padding: 15px 18px;

        font-size: 17px;

        cursor: pointer;

        transition: 0.3s;

        text-align: left;
      }

      .menu-btn:hover {
        background: #303030;

        transform: translateX(5px);
      }

      .menu-btn.active {
        background: linear-gradient(135deg, #f7d774, #b8860b);

        color: #111;

        font-weight: bold;
      }

      /* ========================= */
      /* Content */
      /* ========================= */

      .content {
        flex: 1;

        padding: 50px;
      }

      .content h2 {
        color: #f7d774;

        margin-bottom: 30px;

        font-size: 34px;
      }

      /* ========================= */
      /* Team Grid */
      /* ========================= */

      .team-list {
        display: grid;

        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));

        gap: 25px;
      }

      .team-card {
        background: #1b1b1b;

        border-radius: 18px;

        padding: 30px;

        text-align: center;

        border: 1px solid rgba(247, 215, 116, 0.25);

        transition: 0.3s;

        box-shadow:
          0 0 18px rgba(247, 215, 116, 0.08),
          0 10px 25px rgba(0, 0, 0, 0.45);
      }

      .team-card:hover {
        transform: translateY(-8px);

        box-shadow:
          0 0 25px rgba(247, 215, 116, 0.2),
          0 20px 40px rgba(0, 0, 0, 0.5);
      }

      .team-card img {
        width: 90px;

        height: 90px;

        border-radius: 50%;

        object-fit: cover;

        border: 3px solid #f7d774;

        margin-bottom: 18px;
      }

      .team-card h3 {
        color: white;

        font-size: 22px;
      }

      /* ========================= */
      /* Add Match */
      /* ========================= */

      .form-card {
        max-width: 650px;

        margin: auto;

        background: #1b1b1b;

        padding: 35px;

        border-radius: 18px;

        border: 1px solid rgba(247, 215, 116, 0.25);

        box-shadow:
          0 0 20px rgba(247, 215, 116, 0.12),
          0 15px 35px rgba(0, 0, 0, 0.45);
      }

      .form-card input {
        width: 100%;

        padding: 15px;

        margin-bottom: 18px;

        border: none;

        border-radius: 10px;

        background: #262626;

        color: white;

        font-size: 16px;

        border: 1px solid rgba(247, 215, 116, 0.15);

        transition: 0.3s;
      }

      .form-card input::placeholder {
        color: #a5a5a5;
      }

      .form-card input:focus {
        outline: none;

        border-color: #f7d774;

        box-shadow: 0 0 12px rgba(247, 215, 116, 0.25);
      }

      .button-group {
        display: flex;

        gap: 15px;

        margin-top: 10px;
      }

      .gold-btn {
        flex: 1;

        padding: 15px;

        border: none;

        border-radius: 10px;

        background: linear-gradient(135deg, #f7d774, #b8860b);

        color: #111;

        font-size: 16px;

        font-weight: bold;

        cursor: pointer;

        transition: 0.3s;
      }

      .gold-btn:hover {
        transform: translateY(-3px);

        background: linear-gradient(135deg, #ffd700, #d4af37);
      }

      .dark-btn {
        flex: 1;

        padding: 15px;

        border: none;

        border-radius: 10px;

        background: #2d2d2d;

        color: white;

        font-size: 16px;

        cursor: pointer;

        transition: 0.3s;
      }

      .dark-btn:hover {
        background: #3d3d3d;

        transform: translateY(-3px);
      }

      #message {
        margin-top: 20px;

        text-align: center;

        color: #f7d774;

        font-weight: bold;

        min-height: 24px;
      }

      screen-header {
        display: flex;

        justify-content: space-between;

        align-items: center;

        margin-bottom: 30px;

        gap: 20px;
      }

      /* Refresh Button */

      .refresh-btn {
        padding: 12px 22px;

        margin-bottom: 25px;

        border: none;

        border-radius: 8px;

        cursor: pointer;

        font-size: 15px;

        font-weight: bold;

        background: linear-gradient(135deg, #f7d774, #b8860b);

        color: #111;

        transition: 0.3s;
      }

      .refresh-btn:hover {
        transform: translateY(-2px);

        background: linear-gradient(135deg, #ffd700, #d4af37);
      }

      .refresh-btn:active {
        transform: scale(0.98);
      }

      @media (max-width: 768px) {
        .form-card {
          padding: 25px;
        }

        .button-group {
          flex-direction: column;
        }
      }

      /* ========================= */
      /* Tablet */
      /* ========================= */

      @media (max-width: 900px) {
        .sidebar {
          width: 220px;
        }

        .content {
          padding: 35px;
        }
      }

      /* ========================= */
      /* Mobile */
      /* ========================= */

      @media (max-width: 768px) {
        .dashboard {
          flex-direction: column;
        }

        .sidebar {
          width: 100%;

          flex-direction: row;

          justify-content: center;

          align-items: center;

          gap: 15px;

          padding: 20px;
        }

        .sidebar h1 {
          display: none;
        }

        .menu-btn {
          text-align: center;

          flex: 1;
        }

        .content {
          padding: 25px;
        }

        .content h2 {
          text-align: center;

          font-size: 28px;
        }

        .team-list {
          grid-template-columns: 1fr;
        }

        @media (max-width: 600px) {
          .screen-header {
            flex-direction: column;

            align-items: flex-start;
          }

          .refresh-btn {
            width: 100%;
          }
        }
      }
    </style>
  </head>
  <body>
    <div class="dashboard">
      <!-- Sidebar -->

      <aside class="sidebar">
        <h1>Football Admin</h1>

        <button id="viewBtn" class="menu-btn active">View Teams</button>
        <button id="addBtn" class="menu-btn">Add Match</button>
      </aside>

      <!-- Main -->

      <main class="content">
        <section id="viewTeamsScreen">
          <div class="screen-header">
            <h2>Existing Teams</h2>

            <button class="refresh-btn" onclick="getTeams()">Refresh</button>
          </div>
          <div class="team-list" id="team-list">
            <div class="team-card">
              <h3>Refresh Data</h3>
            </div>
          </div>
        </section>
        <section id="addMatchScreen" class="screen" style="display: none">
          <h2>Add Match</h2>

          <div class="form-card">
            <input type="text" id="homeTeam" placeholder="Home Team" />

            <input
              type="text"
              id="urlhomeTeam"
              placeholder="Home Team Flag URL"
            />

            <!-- <input type="text" id="awayTeam" placeholder="Away Team" /> -->

            <!-- <input
              type="text"
              id="urlawayTeam"
              placeholder="Away Team Flag URL"
            /> -->

            <!-- <input type="text" id="stadium" placeholder="Stadium Name" /> -->

            <!-- <input type="text" id="time" placeholder="Match Time" /> -->

            <div class="button-group">
              <button class="gold-btn" onclick="sendData()">
                Submit Match
              </button>

              <button class="dark-btn" onclick="clearForm()">Clear</button>
            </div>

            <p id="message"></p>
          </div>
        </section>
      </main>
    </div>
  </body>
  <script>
    const viewBtn = document.getElementById("viewBtn");
    const addBtn = document.getElementById("addBtn");

    const viewScreen = document.getElementById("viewTeamsScreen");
    const addScreen = document.getElementById("addMatchScreen");

    viewBtn.addEventListener("click", () => {
      viewScreen.style.display = "block";
      addScreen.style.display = "none";

      viewBtn.classList.add("active");
      addBtn.classList.remove("active");
    });

    addBtn.addEventListener("click", () => {
      viewScreen.style.display = "none";
      addScreen.style.display = "block";

      addBtn.classList.add("active");
      viewBtn.classList.remove("active");
    });

    function clearForm() {
      document.getElementById("homeTeam").value = "";
      document.getElementById("urlhomeTeam").value = "";
      // document.getElementById("awayTeam").value = "";
      // document.getElementById("urlawayTeam").value = "";
      // document.getElementById("stadium").value = "";
      // document.getElementById("time").value = "";
    }

    async function getTeams() {
      const teamList = document.getElementById("team-list");
      teamList.innerHTML = "";

      const response = await fetch("http://127.0.0.1:5000/getteams");
      const result = await response.json();

      // for (const res of result) {
      //   teamList.innerHTML += `
      //   <div class="team-card">
      //   <img src="https://crests.football-data.org/algeria.svg" />
      //   <h3>${res}</h3>
      //   </div>
      // `;
      // }
      let html = "";

      for (let key in result) {
        const team = result[key];

        html += `
        <div class="team-card">
            <img src="${team.image}" />
            <h3>${team.name}</h3>
        </div>`;
      }

      teamList.innerHTML = html;
    }

    async function sendData() {
      const data = {
        name: document.getElementById("homeTeam").value,
        // awayTeam: document.getElementById("awayTeam").value,
        // stadium: document.getElementById("stadium").value,
        // time: document.getElementById("time").value,
        image: document.getElementById("urlhomeTeam").value,
        // awayTeamCrest: document.getElementById("urlawayTeam").value,
      };
      // console.log(data);
      document.getElementById("homeTeam").value = "";
      document.getElementById("urlhomeTeam").value = "";
      try {
        const response = await fetch("http://127.0.0.1:5000/addteams", {
          method: "POST",
          headers: {
            "Content-type": "application/json",
          },
          body: JSON.stringify(data),
        });
        const result = await response.json();
        document.getElementById("message").textContent = result.message;
      } catch (error) {
        console.error("Error sending data:", error);
        document.getElementById("message").textContent =
          "Error sending data. Please try again.";
      }
    }
  </script>
</html>
